<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo App</title>
  <!--
    Single source of truth for the initial theme: read the persisted choice
    from localStorage (default: dark) and apply it before first paint to avoid
    a flash of the wrong theme. ThemeSwitch reads this class back at runtime.
  -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme')
        var dark = stored === null ? true : stored === 'dark'
        document.documentElement.classList.toggle('dark', dark)
      } catch (e) {
        document.documentElement.classList.add('dark')
      }
    })()
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-200">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
